name: Pipeline Doctor
on:
  workflow_run:
    workflows: ["CI", "CD"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      RUN_ID:
        description: 'Workflow run ID to diagnose (leave empty to auto-detect latest failed CI run)'
        required: false
        default: ''
      ALLOWED_ACTIONS:
        description: 'Comma-separated allowed actions (e.g., create_pr)'
        required: false
        default: 'create_pr'
      HITL_ENABLED:
        description: 'If true, create a PR and require human review (no auto-merge)'
        required: false
        default: 'false'
      AUTO_MERGE:
        description: 'If true and HITL is false, agent may auto-merge when checks pass'
        required: false
        default: 'false'
jobs:
  doctor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read

    # Run when triggered by a failed workflow_run OR when manually dispatched
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
      #uses - fetches code from github marketplace action
      #run  - executes a command in the shell
      # " | " allows us to write multi-line commands in YAML
      #  so this command, basically tells Python pip command to find PiP module in the same Python version that we are using and to upgrade itself
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install PyGithub google-generativeai langchain-google-genai docker langgraph
          
      - name: Run Pipeline Doctor
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            GITHUB_REPO: ${{ github.repository }}
            workflow_run_id: ${{ github.event.workflow_run.id || github.event.inputs.RUN_ID || '' }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            GEMINI_MODEL: gemini-3-flash-preview
            GEMINI_TEMP: '0.2'
            ALLOWED_ACTIONS: ${{ github.event.inputs.ALLOWED_ACTIONS || 'create_pr' }}
            HITL_ENABLED: ${{ github.event.inputs.HITL_ENABLED || 'false' }}
            # If true and HITL is false, agent may auto-merge when checks pass
            AUTO_MERGE: ${{ github.event.inputs.AUTO_MERGE || 'false' }}
        run: python agentic.py
      - name: List staged artifacts
        if: always()
        run: ls -la agentic_tmp || true

      - name: Upload Agentic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-artifacts
          path: agentic_tmp/
          if-no-files-found: warn