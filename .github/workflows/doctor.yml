name: Pipeline Doctor
on:
  workflow_run:
    workflows: ["CI", "CD"]
    types:
      - completed
jobs:
  doctor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
      #uses - fetches code from github marketplace action
      #run  - executes a command in the shell
      # " | " allows us to write multi-line commands in YAML
      #  so this command, basically tells Python pip command to find PiP module in the same Python version that we are using and to upgrade itself
        run: |
          python -m pip install --upgrade pip
          pip install docker langgraph
          
      - name: Run Pipeline Doctor
        env:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            workflow_run_id: ${{ github.event.workflow_run.id }}
            ai_env_variable: ${{ secrets.AI_ENV_VARIABLE }}
            output_file: pipeline_doctor_report.md
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            GEMINI_MODEL: gemini-2.5-flash
            GEMINI_TEMP: '0.2'
            ALLOWED_ACTIONS: 'write_temp,create_pr'   # tune per safety
            HITL_ENABLED: 'true'  
        run: python agentic.py