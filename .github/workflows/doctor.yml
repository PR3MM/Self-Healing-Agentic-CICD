name: Pipeline Doctor
on:
  workflow_run:
    workflows: ["CI", "CD"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      ALLOWED_ACTIONS:
        description: 'Comma-separated allowed actions (e.g., write_temp,create_pr)'
        required: false
        default: 'create_pr'
      HITL_ENABLED:
        description: 'If true, wait for manual approval marker file before creating PR'
        required: false
        default: 'true'
jobs:
  doctor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    # Run when triggered by a failed workflow_run OR when manually dispatched
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
      #uses - fetches code from github marketplace action
      #run  - executes a command in the shell
      # " | " allows us to write multi-line commands in YAML
      #  so this command, basically tells Python pip command to find PiP module in the same Python version that we are using and to upgrade itself
        run: |
          python -m pip install --upgrade pip
          # Install project requirements and runtime dependencies used by agentic.py
          pip install -r requirements.txt || true
          pip install PyGithub google-generativeai langchain-google-genai docker langgraph
          
      - name: Run Pipeline Doctor
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            workflow_run_id: ${{ github.event.workflow_run.id }}
            ai_env_variable: ${{ secrets.AI_ENV_VARIABLE }}
            output_file: pipeline_doctor_report.md
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            GEMINI_MODEL: gemini-3-flash-preview
            GEMINI_TEMP: '0.2'
            ALLOWED_ACTIONS: ${{ github.event.inputs.ALLOWED_ACTIONS || 'create_pr' }}
            HITL_ENABLED: ${{ github.event.inputs.HITL_ENABLED || 'true' }}
            # Label or comment the PR with this label to signal approval when HITL is enabled
            AGENTIC_APPROVAL_LABEL: 'agentic-approved'
            # Comma-separated usernames allowed to approve (optional)
            AGENTIC_APPROVERS: ''
            # If true (opt-in), agent may auto-merge after approval; default false
            AUTO_MERGE: 'false'
        run: python agentic.py
      - name: List staged artifacts
        if: always()
        run: ls -la .agentic_tmp || true

      - name: Upload Agentic artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: agentic-artifacts
          path: .agentic_tmp/**